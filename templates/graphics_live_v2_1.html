<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Graphic</title>
  <link rel="stylesheet" href="/static/styles_v2_1.css" />
</head>
<body class="graphics-body">
  <div id="graphicsRoot"></div>

  <script>
    let currentVersion = -1;

    function statCards(stats) {
      return (stats || []).map(stat => `
        <div class="stat-card">
          <div class="stat-label">${stat.label}</div>
          <div class="stat-value">${stat.value ?? ""}</div>
        </div>
      `).join("");
    }

    function singlePlayerCard(player, mode, season, position) {
      const shellClass = mode === "Bottom Bar" ? "graphic bottom-bar" : "graphic full-screen";
      const cardClass = mode === "Bottom Bar" ? "single-layout bottom-layout" : "single-layout full-layout";

      return `
        <div class="${shellClass} show">
          <div class="meta-pill">${season} • ${position}</div>
          <div class="${cardClass}">
            <div class="brand-col">
              ${player.team_logo_url ? `<img class="team-logo" src="${player.team_logo_url}" alt="">` : ""}
              ${player.headshot_url ? `<img class="headshot" src="${player.headshot_url}" alt="">` : ""}
            </div>
            <div class="content-col">
              <div class="player-name">${player.player_name || ""}</div>
              <div class="team-name">${player.team || ""}</div>
              <div class="stats-row">${statCards(player.stats)}</div>
            </div>
          </div>
        </div>
      `;
    }

    function headToHead(players, season, position) {
      return `
        <div class="graphic h2h-shell show">
          <div class="meta-pill center-pill">${season} • ${position} • HEAD TO HEAD</div>
          <div class="h2h-layout">
            ${players.map(player => `
              <div class="h2h-side">
                ${player.team_logo_url ? `<img class="team-logo large-logo" src="${player.team_logo_url}" alt="">` : ""}
                ${player.headshot_url ? `<img class="headshot large" src="${player.headshot_url}" alt="">` : ""}
                <div class="player-name center">${player.player_name || ""}</div>
                <div class="team-name center">${player.team || ""}</div>
                <div class="stats-grid">${statCards(player.stats)}</div>
              </div>
            `).join("")}
          </div>
          <div class="versus-badge">VS</div>
        </div>
      `;
    }

    function emptyState() {
      return `<div class="empty-state">NO GRAPHIC LIVE</div>`;
    }

    function renderGraphic(data) {
      const root = document.getElementById("graphicsRoot");

      if (!data.visible || !data.graphic_style || !(data.players || []).length) {
        root.innerHTML = emptyState();
        return;
      }

      if (data.graphic_style === "Head to Head") {
        root.innerHTML = headToHead(data.players, data.season_type, data.position_type);
        return;
      }

      root.innerHTML = singlePlayerCard(data.players[0], data.graphic_style, data.season_type, data.position_type);
    }

    async function pollLive() {
      try {
        const res = await fetch("/api/live", { cache: "no-store" });
        const data = await res.json();

        if (data.version !== currentVersion) {
          currentVersion = data.version;
          renderGraphic(data);
        }
      } catch (err) {
        console.error(err);
      }
    }

    pollLive();
    setInterval(pollLive, 750);
  </script>
</body>
</html>
