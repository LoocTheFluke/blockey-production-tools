<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Broadcast Graphics Control</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body class="control-body">
  <div class="control-wrap">
    <h1>Broadcast Graphics Control</h1>

    <form id="liveForm" class="control-form">
      <label>Graphics Style</label>
      <select name="graphic_style" id="graphic_style">
        <option>Bottom Bar</option>
        <option>Full Screen</option>
        <option>Head to Head</option>
      </select>

      <label>Position Type</label>
      <select name="position_type">
        <option>Skater</option>
        <option>Goalie</option>
      </select>

      <label>Season Type</label>
      <select name="season_type">
        <option>Regular</option>
        <option>Playoffs</option>
      </select>

      <label>Player Name</label>
      <input type="text" name="player_name_1" placeholder="Player 1" required />

      <div id="player2Wrap" style="display:none;">
        <label>Player Name 2</label>
        <input type="text" name="player_name_2" placeholder="Player 2" />
      </div>

      <button type="submit">TAKE LIVE</button>
      <button type="button" id="clearBtn">CLEAR</button>
    </form>

    <div id="status"></div>

    <div class="obs-box">
      <strong>OBS Browser Source URL:</strong>
      <div>/graphics/live</div>
    </div>
  </div>

  <script>
    const graphicStyle = document.getElementById("graphic_style");
    const player2Wrap = document.getElementById("player2Wrap");
    const form = document.getElementById("liveForm");
    const status = document.getElementById("status");
    const clearBtn = document.getElementById("clearBtn");

    function syncPlayerFields() {
      player2Wrap.style.display = graphicStyle.value === "Head to Head" ? "block" : "none";
    }

    graphicStyle.addEventListener("change", syncPlayerFields);
    syncPlayerFields();

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const formData = new FormData(form);

      const resp = await fetch("/api/set-live", {
        method: "POST",
        body: formData
      });

      const data = await resp.json();

      if (resp.ok) {
        status.textContent = "LIVE GRAPHIC UPDATED";
      } else {
        status.textContent = data.detail || "ERROR";
      }
    });

    clearBtn.addEventListener("click", async () => {
      const resp = await fetch("/api/clear");
      const data = await resp.json();
      status.textContent = resp.ok ? "GRAPHIC CLEARED" : (data.detail || "ERROR");
    });
  </script>
</body>
</html>
